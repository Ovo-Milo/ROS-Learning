<svg xmlns="http://www.w3.org/2000/svg" width="480" height="130" viewBox="0 0 480 130">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2b5797;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3a6a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="robot" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#64b5f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#42a5f5;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="480" height="130" rx="16" fill="url(#bg)"/>
  <!-- Decorative grid dots -->
  <g fill="#ffffff" fill-opacity="0.06">
    <circle cx="30" cy="20" r="1.5"/><circle cx="50" cy="20" r="1.5"/><circle cx="70" cy="20" r="1.5"/><circle cx="90" cy="20" r="1.5"/>
    <circle cx="30" cy="40" r="1.5"/><circle cx="50" cy="40" r="1.5"/><circle cx="70" cy="40" r="1.5"/><circle cx="90" cy="40" r="1.5"/>
    <circle cx="390" cy="80" r="1.5"/><circle cx="410" cy="80" r="1.5"/><circle cx="430" cy="80" r="1.5"/><circle cx="450" cy="80" r="1.5"/>
    <circle cx="390" cy="100" r="1.5"/><circle cx="410" cy="100" r="1.5"/><circle cx="430" cy="100" r="1.5"/><circle cx="450" cy="100" r="1.5"/>
  </g>
  <!-- Robot Icon -->
  <g transform="translate(35, 18)">
    <!-- Antenna -->
    <line x1="30" y1="5" x2="30" y2="16" stroke="#64b5f6" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="30" cy="4" r="3" fill="#42a5f5"/>
    <!-- Head -->
    <rect x="10" y="16" width="40" height="28" rx="8" fill="url(#robot)" opacity="0.95"/>
    <!-- Eyes -->
    <circle cx="23" cy="30" r="4" fill="#1a3a6a"/>
    <circle cx="37" cy="30" r="4" fill="#1a3a6a"/>
    <circle cx="24" cy="29" r="1.5" fill="#fff"/>
    <circle cx="38" cy="29" r="1.5" fill="#fff"/>
    <!-- Mouth -->
    <path d="M22 37 Q30 42 38 37" stroke="#1a3a6a" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Body -->
    <rect x="14" y="48" width="32" height="24" rx="6" fill="url(#robot)" opacity="0.85"/>
    <!-- Body detail -->
    <circle cx="30" cy="60" r="4" fill="#1a3a6a" opacity="0.4"/>
    <!-- Arms -->
    <rect x="2" y="50" width="10" height="5" rx="2.5" fill="#64b5f6" opacity="0.7"/>
    <rect x="48" y="50" width="10" height="5" rx="2.5" fill="#64b5f6" opacity="0.7"/>
  </g>
  <!-- Title -->
  <text x="120" y="52" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',system-ui,sans-serif" font-size="30" font-weight="700" fill="#ffffff" letter-spacing="1">ROS 机器人学习笔记</text>
  <!-- Subtitle -->
  <text x="120" y="92" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',system-ui,sans-serif" font-size="16" fill="#90caf9" letter-spacing="0.5">从零开始的 ROS 机器人开发完整学习路径</text>
</svg>
